<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Register</title>
        <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    </head>
    <body>
        <div class="register">

            <div class="icon">
                <img src="{{url_for('static', filename='images/myicon.png')}}" alt=" Register Icon">
            </div>

            <h1>Register</h1>
            <div class="links">
                <a href="{{url_for('auth.login')}}">Login</a>
                <a href="{{url_for('auth.register')}}" class="active">Register</a>
            </div>
            <form action="{{url_for('auth.register')}}" method="post" autocomplete="off">
                <label for="username">
                    <i class="fas fa-user"></i>
                </label>
                <input type="text" name="username" placeholder="Username" id="username" required>
                <label for="password">
                    <i class="fas fa-lock"></i>
                </label>
                <input type="password" name="password" placeholder="Password" id="password" required>
                <label for="role">
                    <i class="fas fa-id-badge"></i>
                </label>
                <input type="test" name="role" placeholder="Role" id="role" required>
                <div class="msg">{{ msg }}</div>
                <input type="submit" value="Register">
            </form>
        </div>
    </body>
</html>

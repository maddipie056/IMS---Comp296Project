<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="stylesheet" href="{{url_for('static', filename='admdashboard.css')}}">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="brand">
                <img class = "brand-logo" src="{{url_for('static', filename='images/myicon.png')}}" alt="Dash Icon">
                <h2>Admin</h2>
            </div>
            <nav class = "menu">
                <a href="{{url_for('admin.dashboard')}}">Dashboard</a>
                <a href="{{url_for('admin.view_accounts')}}" class="active">Accounts</a>
            </nav>

            <div class="logout-section">
                <p class="username">{{username}}</p>
                <a href="{{url_for('auth.logout')}}" class="logout-btn">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <section class="form-section">
                <h2>Create Employee Account</h2>
                <form method="POST" action="{{url_for('admin.create_account')}}">
                    <label>First Name*</label>
                    <input type="text" name="first_name" required>

                    <label>Last Name*</label>
                    <input type="text" name="last_name" required>

                    <label>Email*</label>
                    <input type="text" name="email" required>

                    <label>Phone</label>
                    <input type="text" name="phone_number" required>

                    <label>Username*</label>
                    <input type="text" name="username" required>

                    <label>Password*</label>
                    <input type="password" name="password" required>

                    <label>Role*</label>
                    <select name="role_id" required>
                        <option value="">Select Role</option>
                        {% for role in roles %}
                            <option value="{{role.id}}">{{role.name}}</option>
                        {% endfor %}
                    </select>

                    <div class="form-buttons">
                        <button type="submit" class="primary-button">Create Account</button>
                        <button type="reset" class="secondary-button">Clear</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>

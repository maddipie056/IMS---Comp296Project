<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Accounts</title>
    <link rel="stylesheet" href="{{url_for('static', filename='admdashboard.css')}}">
</head>
<body>
    <div class="dashboard-container">
        <aside class = "sidebar">
            <div class="brand">
                <img class = "brand-logo" src="{{url_for('static', filename='images/myicon.png')}}" alt="Dash Icon">
                <h2>Admin</h2>
            </div>
            <nav class = "menu">
                <a href="{{url_for('admin.dashboard')}}">Dashboard</a>
                <a href="{{url_for('admin.view_accounts')}}">Accounts</a>
                <a href="{{url_for('admin.roles')}}" class="active">Role Management</a>
            </nav>

            <div class="logout-section">
                <p class="username">{{username}}</p>
                <a href="{{url_for('auth.logout')}}" class="logout-btn">Logout</a>
            </div>
        </aside>
        <main class="main-content">
            <h2>Role Management</h2>
            <table class = "product-table">
                <thead>
                    <tr>
                        <th>Role</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for role in roles %}
                    <tr>
                        <td>{{ role.name }}</td>
                        <td>{{ role.description }}</td>
                        <td>
                            <a href="{{ url_for('admin.edit_role', role_id=role.id) }}" class="action-link">Edit</a>
                            <a href="{{ url_for('admin.delete_role', role_id=role.id) }}" class="action-link">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <h3>Create New Role</h3>
            <form method="POST" class = "simple-form">
                {{form.csrf_token}}
                <label>Role Name*</label>
                <input type="text" name="name" required>

                <label>Description</label>
                <textarea name="description"></textarea>

                <div class="form-buttons">
                    <button class="primary-button">Create Role</button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>

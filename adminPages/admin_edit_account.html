<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Account</title>
    <link rel="stylesheet" href="{{url_for('static', filename='admdashboard.css')}}">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="brand">
                <img class = "brand-logo" src="{{url_for('static', filename='images/myicon.png')}}" alt="Dash Icon">
                <h2>Admin</h2>
            </div>
            <nav class = "menu">
                <a href="{{url_for('admin.dashboard')}}">Dashboard</a>
                <a href="{{url_for('admin.view_accounts')}}" class="active">Accounts</a>
            </nav>

            <div class="logout-section">
                <p class="username">{{username}}</p>
                <a href="{{url_for('auth.logout')}}" class="logout-btn">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <h2>Edit Account</h2>
            <section class="form-section">
                <form method="POST">
                    <label>First Name*</label>
                    <input type="text" name="first_name" value={{user.first_name}} required>

                    <label>Last Name*</label>
                    <input type="text" name="last_name" value={{user.last_name}} required>

                    <label>Email*</label>
                    <input type="text" name="email" value={{user.email}} required>

                    <label>Phone</label>
                    <input type="text" name="phone_number" value="{{user.phone_number}}" required>

                    <label>Username*</label>
                    <input type="text" name="username" value="{{user.username}}" required>

                    <label>Password*</label>
                    <input type="text" name="password" value="{{user.password_hash}}">

                    <label>Role*</label>
                    <select name="role_id" required>
                        {% for role in roles %}
                            <option value="{{ role.id }}"
                                {% if user.role_id == role.id %}selected{% endif %}>
                                {{ role.name }}
                            </option>
                        {% endfor %}
                    </select>

                    <label>Status*</label>
                    <select name="is_active" required>
                        <option value="1" {% if user.is_active %}selected{% endif %}>Active</option>
                        <option value="0" {% if not user.is_active %}selected{% endif %}>Inactive</option>
                    </select>
                    <div class="form-buttons">
                        <button class="primary-button">Save</button>
                        <a href="{{ url_for('admin.view_accounts') }}" class="secondary-button">Cancel</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>

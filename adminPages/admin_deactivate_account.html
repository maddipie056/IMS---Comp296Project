<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deactivate Account</title>
    <link rel="stylesheet" href="{{url_for('static', filename='admindashboard.css')}}">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="brand">
                <img class = "brand-logo" src="{{url_for('static', filename='images/myicon.png')}}" alt="Dash Icon">
                <h2>Admin</h2>
            </div>
            <nav class = "menu">
                <a href="{{url_for('admin.dashboard')}}">Dashboard</a>
                <a href="{{url_for('admin.accounts')}}">Accounts</a>
                <a href="{{url_for('admin.create_account')}}">Create Account</a>
                <a href="{{url_for('admin.roles')}}">Role Management</a>
            </nav>

            <div class="logout-section">
                <p class="username">{{username}}</p>
                <a href="{{url_for('auth.logout')}}" class="logout-btn">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <h2>Deactivate / Delete Account</h2>
            <section class="form-section">
                <form method="POST" action="simple-form">
                    <label>Search User</label>
                    <input type="text" name="search" placeholder="Enter username">
                    <hr>
                    {% if user %}
                    <p><strong>User:</strong>{{user.username}}</p>
                    <p><strong>Role:</strong>{{user.role}}</p>
                    <p><strong>Status:</strong>{{user.status}}</p>
                    <div class="form-buttons">
                        <button class="primary-button">Deactivate</button>
                        <button type="reset" class="secondary-button">Delete</button>
                    </div>
                    {%else%}
                    <p>No user selected.<p>
                    {%endif%}
                </form>
            </section>
        </main>
    </div>
</body>
</html>
